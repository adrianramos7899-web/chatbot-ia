<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Chatbot IA - Windows 2006</title><style>body { background: #008080; font-family: Tahoma, Arial, sans-serif; margin: 0; padding: 0; min-height: 100vh; } .window { width: 440px; margin: 40px auto 0 auto; background: #e4e6e9; border: 2px solid #395e8f; border-radius: 8px 8px 0 0; box-shadow: 0 4px 32px #0005; overflow: hidden; } .title-bar { background: linear-gradient(90deg, #395e8f 60%, #a6c2ed 100%); color: #fff; padding: 8px 0 8px 16px; font-weight: bold; font-size: 15px; border-bottom: 1.5px solid #fff; display: flex; align-items: center; } .content { display: flex; flex-direction: row; padding: 0; } .bot-avatar { width: 70px; min-width: 70px; height: 70px; background: #b6bfc8; margin: 20px 16px; border: 2px solid #898989; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: background 0.4s; } .chat-area { flex: 1; display: flex; flex-direction: column; margin: 16px 18px 8px 0; } .messages { flex-grow: 1; background: #f5f6f7; border: 1px solid #b1b1b1; border-radius: 6px; padding: 12px 8px; height: 260px; overflow-y: auto; font-size: 15px; margin-bottom: 10px; } .message { margin: 8px 0 3px 0; } .message.user { color: #2168af; text-align: right; } .message.bot { color: #444; text-align: left; } .input-area { display: flex; gap: 7px; } .input-area input { flex: 1; padding: 6px 10px; border: 1.5px solid #4682b4; border-radius: 3px; outline: none; font-size: 13px; } .input-area button { background: linear-gradient(90deg,#6ea6d8 60%,#e5eeff 100%); color: #184ea6; border: 1.5px solid #395e8f; border-radius: 3px; font-weight: bold; font-size: 13px; padding: 6px 17px; cursor: pointer; box-shadow: 1px 1px 3px #aacdf6; transition: background 0.2s; } .api-key-bar { background: #e6eaea; padding: 6px 16px; color: #256080; font-size: 12px; border-top: 1.5px solid #b1b1b1; text-align: right; font-family: Consolas, monospace; }</style></head><body><div class="window"><div class="title-bar">Chatbot IA - Windows 2006</div><div class="content"><div class="bot-avatar" id="botAvatar">Bot</div><div class="chat-area"><div class="messages" id="messages"></div><form class="input-area" id="chatForm"><input type="text" id="userInput" placeholder="Digite sua mensagem..."><button type="submit">Enviar</button></form></div></div><div class="api-key-bar">API: AI-XYZ123</div></div><script>const messagesDiv = document.getElementById('messages'); const chatForm = document.getElementById('chatForm'); const userInput = document.getElementById('userInput'); function appendMessage(text, sender='bot') { const msg = document.createElement('div'); msg.className = 'message ' + sender; msg.textContent = text; messagesDiv.appendChild(msg); messagesDiv.scrollTop = messagesDiv.scrollHeight; } chatForm.addEventListener('submit', function(e) { e.preventDefault(); const text = userInput.value.trim(); if (!text) return; appendMessage(text, 'user'); userInput.value = ''; }); window.onload = () => { appendMessage('Bem-vindo ao Chatbot IA!','bot'); };</script></body></html>
